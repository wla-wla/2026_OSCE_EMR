    border-bottom:1px solid #06101e;

  .brand { font-weight:800; letter-spacing:.2px; white-space:nowrap; }
  .top-tabs { display:flex; gap:2px; height:100%; align-items:flex-end; }
  .top-tab {

  .searchbar { flex:1; max-width:520px; display:flex; align-items:center; gap:8px; margin-left:auto; }

  .clock { color:#b8c7da; font-size:12px; white-space:nowrap; }

  .patient-lines i { color:var(--line); font-style:normal; }

  .badge {

    gap:5px;

    padding:4px 8px;
    font-size:12px;

  .badge.lab { background:var(--warn-bg); color:var(--warn); border-color:#ffe0a3; }
  .badge.status { background:var(--ok-bg); color:var(--ok); border-color:#bdebcf; }
  .main {

    gap:12px;
    padding:12px;
  }
  .left-nav,.center,.right-panel {
    min-height:0;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    box-shadow:var(--shadow);
    overflow:hidden;
  }
  .left-nav { background:var(--nav); color:#dfebf8; overflow-y:auto; }
  .nav-head {

    color:#b7c7dc;
    display:flex;
    justify-content:space-between;
    align-items:center;

  }
  .nav-btn {

    gap:8px;
    text-align:left;
    border:0;
    background:transparent;
    color:#e7f0fb;
    padding:8px 14px 8px 16px;
    border-left:3px solid transparent;

    font-size:11px;
    border:1px solid rgba(255,255,255,.18);
    border-radius:999px;
    padding:0 5px;

  .center { display:flex; flex-direction:column; }
  .content-head {
    height:48px;
    min-height:48px;
    background:#fbfcfe;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 16px;

  .content-title { font-weight:800; font-size:16px; }
  .content-tools { display:flex; gap:8px; align-items:center; color:var(--sub); font-size:12px; }

  .right-panel { overflow:auto; }

    background:#fbfcfe;
    border-bottom:1px solid var(--line);
    padding:12px 14px;
    font-size:14px;

  .right-label { color:var(--muted); font-size:11px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; margin-bottom:6px; }
  .cards { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
  .cards.three { grid-template-columns:repeat(3,minmax(0,1fr)); }
  .card {
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:10px;
    overflow:hidden;
    margin-bottom:12px;
  }
  .card-title {
    background:#f6f8fb;
    border-bottom:1px solid var(--line);
    padding:9px 12px;
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }
  .card-title small { color:var(--sub); font-weight:500; }
  .card-body { padding:12px; }
  .metric {
    border:1px solid var(--line);
    background:#fff;
    border-radius:9px;
    padding:11px;
    min-height:83px;
  }
  .metric-label { color:var(--muted); font-size:11px; text-transform:uppercase; font-weight:800; letter-spacing:.4px; }
  .metric-value { font-size:20px; font-weight:800; margin-top:4px; }
  .metric-sub { color:var(--sub); font-size:12px; margin-top:3px; }
  .kv { display:grid; grid-template-columns:138px minmax(0,1fr); gap:7px 12px; }
  .kv.wide { grid-template-columns:180px minmax(0,1fr); }
  .key { color:var(--sub); font-size:12px; }
  .val { font-weight:600; min-width:0; }
  .empty { color:var(--muted); font-style:italic; font-weight:400; }

  th,td {

    text-align:left;

    font-size:12px;
    font-weight:800;
    position:sticky;
    top:0;
    z-index:1;

  .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:9px; }
  .nowrap { white-space:nowrap; }

    gap:4px;

    border-radius:8px;

    padding:11px 12px;
    margin-bottom:10px;

  .soap b { color:#2d4967; }
  .timeline { border-left:3px solid #c7d7e9; margin-left:10px; padding-left:16px; }
  .event {
    position:relative;
    border:1px solid var(--line);
    border-radius:9px;
    background:#fff;
    padding:10px 12px;
    margin-bottom:12px;
  }
  .event:before {
    content:"";
    position:absolute;
    left:-23px;
    top:14px;
    width:11px;
    height:11px;
    border-radius:50%;
    background:#1685af;
    border:2px solid #fff;
    box-shadow:0 0 0 2px #c7d7e9;
  }
  .event-date { color:var(--sub); font-weight:800; font-size:12px; margin-bottom:4px; }
  .event-title { font-weight:800; margin-bottom:3px; }

    align-items:center;
    justify-content:center;
    min-width:22px;
    height:20px;
    padding:0 6px;
    border-radius:5px;
    font-size:11px;
    font-weight:900;
    margin-left:5px;
    border:1px solid transparent;
  }

  .flag.L,.flag.LL { background:var(--blue-bg); color:var(--blue); border-color:#cbe0ff; }
  .flag.N { display:none; }
  .flag.C { background:#361313; color:#fff; }
  .lab-value { font-weight:800; white-space:nowrap; }
  .lab-cell.abnormal { background:#fff9ed; }
  .lab-cell.critical { background:#ffecec; }
  .status-continued { background:#f8fafc; }
  .status-new_on_discharge,.status-new { background:#f0fff4; }
  .status-discontinued { background:#fff4f4; }
  .empty-state {

    background:#fafcff;
    color:var(--sub);
    border-radius:10px;
    padding:24px;
    text-align:center;
  }
  .empty-state b { display:block; color:#34445a; margin-bottom:4px; }
  .mini-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; }
  .footer-note { color:var(--muted); font-size:12px; margin-top:10px; }

    .badge-row { justify-content:flex-start; }

    .kv,.kv.wide { grid-template-columns:120px minmax(0,1fr); }
    .top-tabs,.clock { display:none; }

}
function td(v, cls='') { return `<td class="${cls}">${v}</td>`; }
function chipFlag(flag) {
  if(!flag || flag==='N') return '';

}

function nav() {

    `<div class="nav-section">${esc(g.label)}</div>` + g.items.map(([id,label],idx)=>`<button class="nav-btn ${id==='overview'?'active':''}" data-tab="${id}"><span>${esc(label)}</span>${countBadge(id)}</button>`).join('')

function countBadge(id) {

    nursing: caseData.clinicalRecords.nursingNotes?.length,

function rightPanel() {
  const probs = (caseData.problemList||[]).slice(0,6).map(p=>pill(p.problem,'active')).join('');
  const lastVitals = caseData.vitalSigns?.[caseData.vitalSigns.length-1];

  const dc = (caseData.dischargeMedications||[]).map(m=>pill(m.drugName, m.changeFromHomeMed==='new'?'new':'')).join('');

    <div class="right-block"><div class="right-label">Abnormal Labs</div>${abn || '<span class="empty">해당 없음</span>'}</div>
    <div class="right-block"><div class="right-label">Discharge Medications</div>${dc || '<span class="empty">미기재</span>'}</div>
    <div class="right-block"><div class="right-label">Allergy</div><b>${esc((caseData.patientHeader.allergies||[]).map(a=>a.substance).join(', ') || '미기재')}</b></div>
  `;

function section(title, body, small='') { return `<div class="card"><div class="card-title"><span>${esc(title)}</span>${small?`<small>${esc(small)}</small>`:''}</div><div class="card-body">${body}</div></div>`; }
function kv(obj) {
  return `<div class="kv">${obj.map(([k,v])=>`<div class="key">${esc(k)}</div><div class="val">${v}</div>`).join('')}</div>`;
}

    <div class="cards three">
      <div class="metric"><div class="metric-label">Chief Complaint</div><div class="metric-value" style="font-size:17px">${val(c.chiefComplaint)}</div><div class="metric-sub">응급실 경유 입원</div></div>
      <div class="metric"><div class="metric-label">입원 당시</div><div class="metric-value">${firstV?esc(firstV.bp):'--'}</div><div class="metric-sub">HR ${firstV?esc(firstV.hr):'--'}, SpO₂ ${firstV?esc(firstV.spo2):'--'}% ${firstV?esc(firstV.o2Device):''}</div></div>
      <div class="metric"><div class="metric-label">퇴원 당일</div><div class="metric-value">${latestV?esc(latestV.bp):'--'}</div><div class="metric-sub">BW ${latestV?esc(latestV.weightKg):'--'} kg, abnormal lab ${abnCount}</div></div>
    </div>

    ${section('Clinical Course Summary', val(h.timelineText))}
    ${section('Medication Snapshot', `<div class="cards"><div>${miniTable('Home Medication', caseData.homeMedications.map(m=>`${esc(m.drugName)} ${esc(m.dose)} ${esc(m.frequency)}`))}</div><div>${miniTable('Discharge Medication', caseData.dischargeMedications.map(m=>`${esc(m.drugName)} ${esc(m.dose)} ${esc(m.frequency)}`))}</div></div>`)}

function miniTable(title, rows) { return `<div class="card" style="margin:0"><div class="card-title">${esc(title)}</div><div class="card-body">${rows.map(r=>`<div style="padding:3px 0">${r}</div>`).join('')}</div></div>`; }

function noteBlock(n) {

}
function renderNursing() {

function renderDiagnosis() {

function renderVitals() {
  const rows=(caseData.vitalSigns||[]).map(v=>`<tr>${td(val(v.label))}${td(val(v.date || v.dateTime))}${td(`<b>${val(v.bp)}</b>`)}${td(val(v.hr))}${td(val(v.rr))}${td(val(v.bt)+' ℃')}${td(`<b>${val(v.spo2)}%</b>`)}${td(val(v.o2Device))}${td(val(v.weightKg)+' kg')}${td(val(v.painScore))}</tr>`);
  return table(['Label','Date','BP','HR','RR','BT','SpO₂','O₂','BW','Pain'], rows);
}
function renderLabs() {
  const labs=caseData.labResults||[];
  const dates=[...new Set(labs.map(l=>l.label || l.date || ''))];
  const items=[...new Set(labs.map(l=>l.item))];
  const order=['Na','K','Cl','CO2','BUN','SCr','eGFR','Uric acid','NT-proBNP','WBC','Hb','Platelet','AST','ALT','LDL-C'];
  items.sort((a,b)=>(order.indexOf(a)<0?999:order.indexOf(a))-(order.indexOf(b)<0?999:order.indexOf(b)) || a.localeCompare(b));
  const rows=items.map(item=>{
    const byItem=labs.filter(l=>l.item===item);
    const first=byItem[0]||{};
    const cells=dates.map(d=>{
      const r=byItem.find(x=>(x.label||x.date||'')===d);
      if(!r) return td('<span class="empty">-</span>');
      const abnormal = r.flag && r.flag!=='N';
      return td(`<span class="lab-value">${esc(r.displayResult ?? r.result)}</span>${chipFlag(r.flag)}`, `lab-cell ${abnormal?'abnormal':''} ${r.critical?'critical':''}`);
    }).join('');
    return `<tr>${td(`<b>${esc(item)}</b>`)}${td(val(first.unit))}${td(val(first.referenceText))}${cells}</tr>`;
  });
  const abn = labs.filter(l=>l.flag && l.flag!=='N').length;
  return `
    <div class="cards three">
      <div class="metric"><div class="metric-label">Total results</div><div class="metric-value">${labs.length}</div><div class="metric-sub">${dates.join(' / ')}</div></div>

      <div class="metric"><div class="metric-label">Reference profile</div><div class="metric-value" style="font-size:15px">General Adult v1</div><div class="metric-sub">일반 성인 참고치</div></div>
    </div>
    ${table(['검사명','단위','참고치',...dates], rows, 'labs')}
    <div class="footer-note">Lab 값은 원자료 값을 유지하고, 참고치와 H/L 표시는 화면 표시용 reference profile로 계산한 보강 레이어입니다.</div>
  `;
}

function renderOrders() {
  const rows=(caseData.medicationOrders||[]).map(o=>`<tr class="status-${esc(o.status)}">${td(val(o.orderId))}${td(val(o.orderDate || o.orderDateTime))}${td(pill(o.orderType||''))}${td(`<b>${val(o.drugName)}</b>`)}${td(val(o.dose))}${td(val(o.route))}${td(val(o.frequency))}${td(val(o.duration))}${td(pill(statusLabel(o.status),'new'))}${td(val(o.indication))}</tr>`);

function renderDischargeMed() {
  const rows=(caseData.dischargeMedications||[]).map(m=>`<tr class="status-${esc(m.changeFromHomeMed)}">${td(`<b>${val(m.drugName)}</b>`)}${td(val(m.dose))}${td(val(m.route))}${td(val(m.frequency))}${td(val(m.duration))}${td(pill(statusLabel(m.changeFromHomeMed), m.changeFromHomeMed==='new'?'new':'active'))}${td(val(m.indication))}${td(val(m.note))}</tr>`);

function renderPharmacy() {
  const notes=(caseData.pharmacyReviewRequests||[]).map(n=>`<div class="note"><div class="note-meta"><span>Pharmacist Review Request</span><span>${fmtDateTime(n.dateTime || n.date)}</span></div><div>${val(n.requestText || n.freeText || n.note)}</div></div>`).join('');

const renderers = {overview:renderOverview,basic:renderBasic,timeline:renderTimeline,hpi:renderHpi,er:renderER,nursing:renderNursing,dischargePlan:renderDischargePlan,diagnosis:renderDiagnosis,pmh:renderPMH,social:renderSocial,vitals:renderVitals,labs:renderLabs,tests:renderTests,homeMed:renderHomeMed,medId:renderMedId,medRec:renderMedRec,orders:renderOrders,mar:renderMAR,dischargeMed:renderDischargeMed,pharmacy:renderPharmacy};
function selectTab(id) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  el('contentTitle').textContent = titles[id] || id;
  el('contentBody').innerHTML = (renderers[id] || renderOverview)();
}
patientBanner(); nav(); rightPanel(); selectTab('overview');
el('leftNav').addEventListener('click', e=>{ const btn=e.target.closest('.nav-btn'); if(btn) selectTab(btn.dataset.tab); });
</script>
